workflows:
  ios-native-simulator-preview:
    name: iOS Native Simulator Preview
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      xcode: latest
      vars:
        XCODE_PROJECT: "TowerPlan.xcodeproj"
        XCODE_SCHEME: "TowerPlan"

    scripts:
      - name: Show Xcode project info
        script: |
          set -e
          xcodebuild -list -project "$CM_BUILD_DIR/$XCODE_PROJECT"

      - name: Verify versions in project
        script: |
          set -x
          grep -n "MARKETING_VERSION" "$CM_BUILD_DIR/$XCODE_PROJECT/project.pbxproj" || true
          grep -n "CURRENT_PROJECT_VERSION" "$CM_BUILD_DIR/$XCODE_PROJECT/project.pbxproj" || true

      - name: Build .app for iOS Simulator
        script: |
          set -e

          xcodebuild build \
            -project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO

      - name: Collect simulator .app
        script: |
          set -e
          mkdir -p simulator_artifacts
          find "$HOME/Library/Developer/Xcode/DerivedData" -name "*.app" -type d -exec cp -R {} simulator_artifacts/ \;
          echo "=== Collected apps ==="
          find simulator_artifacts -maxdepth 2 -type d -name "*.app" -print

    artifacts:
      - simulator_artifacts/*.app
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
